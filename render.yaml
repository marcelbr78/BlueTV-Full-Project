services:
  - type: web
    name: bluetv-backend
    env: node
    plan: free
    buildCommand: cd backend_panel && npm install
    startCommand: cd backend_panel && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 10000
      - key: APP_API_KEY
        generateValue: true
      - key: WHATSAPP_NUMBER
        value: "5511999999999"
