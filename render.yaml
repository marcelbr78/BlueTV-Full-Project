services:
  - type: web
    name: bluetv-backend
    runtime: node
    rootDir: backend_panel
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: APP_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: bluetv-db
      mountPath: /data
      sizeGB: 1
