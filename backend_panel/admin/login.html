<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueTV Admin - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background: rgba(22, 33, 62, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 36px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .logo span {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #888;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .form-group input::placeholder {
      color: #555;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid #e94560;
      color: #e94560;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-top: 15px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="logo">
      <h1>📺 BlueTV</h1>
      <span>Painel Administrativo</span>
    </div>

    <form onsubmit="login(event)">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="user" placeholder="Digite seu usuário" required autofocus>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="pass" placeholder="Digite sua senha" required>
      </div>

      <button type="submit">Entrar</button>

      <div id="msg" class="error-msg"></div>
    </form>
  </div>

  <script>
    function login(e) {
      e.preventDefault();

      const username = document.getElementById("user").value;
      const password = document.getElementById("pass").value;
      const msgEl = document.getElementById("msg");

      msgEl.classList.remove('show');

      fetch("/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            localStorage.setItem("logado", "true");
            localStorage.setItem("ultimaAtividade", Date.now());
            window.location.href = "/admin/index.html";
          } else {
            msgEl.textContent = "Usuário ou senha incorretos";
            msgEl.classList.add('show');
          }
        })
        .catch(() => {
          msgEl.textContent = "Erro ao conectar ao servidor";
          msgEl.classList.add('show');
        });
    }
  </script>

</body>

</html>
