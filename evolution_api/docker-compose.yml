version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: bluetv-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=bluetv_evolution_key_2026
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DEL_INSTANCE=false
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false
      - WEBHOOK_GLOBAL_URL=https://bluetv-full-project.onrender.com/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_INSERT_CONTACTS=false
      - WEBHOOK_EVENTS_UPDATE_CONTACTS=false
      - WEBHOOK_EVENTS_UPSERT_CONTACTS=false
      - WEBHOOK_EVENTS_UPSERT_CHATS=false
      - WEBHOOK_EVENTS_UPDATE_CHATS=false
      - WEBHOOK_EVENTS_DELETE_CHATS=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=false
      - CONFIG_SESSION_PHONE_CLIENT=BlueTV
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
      - LANGUAGE=pt-BR
    volumes:
      - evolution_data:/evolution/instances

volumes:
  evolution_data:
